<!DOCTYPE html>
<html>
<head>
    <title>Neural Interceptor: Blood Moon</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #ff3333;
            background: rgba(20, 0, 0, 0.7); padding: 15px;
            border: 1px solid #ff3333; z-index: 10; pointer-events: none;
        }
        .stat-row { display: flex; justify-content: space-between; width: 180px; margin: 5px 0; }
        .pulse-active { box-shadow: 0 0 20px #ff0000; border-color: #ff0000 !important; color: #ffffff !important; }
        #preview-container {
            position: absolute; bottom: 20px; right: 20px; width: 200px; height: 150px;
            border: 1px solid #ff3333; transform: scaleX(-1);
        }
        #webcam, #hand-wireframe { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-weight: 700; font-size: 1.2rem; margin-bottom: 10px;">NEURAL PILOT HUD</div>
        <div class="stat-row"><span>ALTITUDE</span> <span id="alt-val">00</span></div>
        <div class="stat-row"><span>VECTOR</span> <span id="hand-coord">X:0 Y:0</span></div>
        <div class="stat-row"><span>SYSTEMS</span> <span id="status">GIMBAL READY</span></div>
        <hr style="border: 0; border-top: 1px solid rgba(255,0,0,0.3); margin: 10px 0;">
        <div style="font-size: 0.6rem; color: #fff; opacity: 0.6;">PALM: STEER | PINCH: FIRE | HIGH ALT: BOOST</div>
    </div>

    <div id="preview-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas class="output_canvas" id="hand-wireframe"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script>
        // --- 1. Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const lasers = [];
        const enemies = [];
        const particles = [];
        let targetPos = new THREE.Vector3(0, 0, 0);
        let jetVelocity = new THREE.Vector3(0, 0, 0); // To track lateral movement for firing
        let isPinching = false;

        // Red Starfield
        const starGeo = new THREE.BufferGeometry();
        const starCoords = [];
        for (let i = 0; i < 3000; i++) {
            starCoords.push((Math.random() - 0.5) * 150, (Math.random() - 0.5) * 150, (Math.random() - 0.5) * -300);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xff2222, size: 0.15 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);


        
        // --- 2. Player Jet ---
        const jetGroup = new THREE.Group();
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.8, roughness: 0.2 });
        const fuselage = new THREE.Mesh(new THREE.ConeGeometry(0.4, 3, 4), bodyMat);
        fuselage.rotation.x = Math.PI / 2;
        jetGroup.add(fuselage);
        const wings = new THREE.Mesh(new THREE.BoxGeometry(4, 0.05, 1.2), bodyMat);
        wings.position.z = 0.5;
        jetGroup.add(wings);
        scene.add(jetGroup);

        scene.add(new THREE.DirectionalLight(0xffffff, 1.2));
        scene.add(new THREE.AmbientLight(0x330000));
        camera.position.z = 6;

        // --- 3. Enhanced Logic ---
        function createParticle(pos, color, size = 0.08, spread = 0.1) {
            const pGeo = new THREE.SphereGeometry(size, 4, 4);
            const pMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 });
            const p = new THREE.Mesh(pGeo, pMat);
            p.position.copy(pos);
            p.userData = { life: 1.0, vel: new THREE.Vector3((Math.random()-0.5)*spread, (Math.random()-0.5)*spread, 0.5) };
            scene.add(p);
            particles.push(p);
        }

        function spawnEnemyJet() {
            const eGroup = new THREE.Group();
            const eMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x660000 });
            const body = new THREE.Mesh(new THREE.ConeGeometry(0.4, 2.5, 4), eMat);
            body.rotation.x = -Math.PI / 2;
            eGroup.add(body);
            const wings = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.1, 0.8), eMat);
            eGroup.add(wings);
            eGroup.position.set((Math.random() - 0.5) * 40, (Math.random() - 0.5) * 30, -250);
            scene.add(eGroup);
            enemies.push({ mesh: eGroup, health: 2 });
        }
        setInterval(spawnEnemyJet, 1200);

        // Navigation-Aware Firing
        function fireNavigationWeapons() {
            const aimTarget = new THREE.Vector3(targetPos.x, targetPos.y, -100); // Point in distance
            
            [-1.8, 1.8].forEach(offsetX => {
                const laser = new THREE.Mesh(
                    new THREE.BoxGeometry(0.18, 0.18, 4), 
                    new THREE.MeshBasicMaterial({ color: 0x00ffcc })
                );
                
                // Spawn at wingtips
                const spawnPos = new THREE.Vector3(jetGroup.position.x + offsetX, jetGroup.position.y, jetGroup.position.z);
                laser.position.copy(spawnPos);
                
                // Calculate direction vector toward the aim target (Gimbaling)
                const dir = new THREE.Vector3().subVectors(aimTarget, spawnPos).normalize();
                laser.lookAt(aimTarget);
                
                // Set custom data for movement
                laser.userData = { 
                    velocity: dir.multiplyScalar(6.5), // High speed projectile
                    lateralInheritance: (targetPos.x - jetGroup.position.x) * 0.1 // Drift based on movement
                };

                scene.add(laser);
                lasers.push(laser);
                for(let i=0; i<4; i++) createParticle(spawnPos, 0xffff00, 0.15, 0.3);
            });
        }

        // --- 4. MediaPipe Setup ---
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('hand-wireframe');
        const canvasCtx = canvasElement.getContext('2d');
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults((results) => {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
                const lm = results.multiHandLandmarks[0];
                drawConnectors(canvasCtx, lm, HAND_CONNECTIONS, {color: '#ff0000', lineWidth: 2});
                
                // Precise Navigation Mapping
                targetPos.x = (lm[9].x - 0.5) * -30; 
                targetPos.y = (0.5 - lm[9].y) * 22;
                
                const pinchDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
                if (pinchDist < 0.05) {
                    if (!isPinching) fireNavigationWeapons();
                    isPinching = true;
                    document.getElementById('status').innerText = "LOCK ENGAGED";
                    document.getElementById('ui').classList.add('pulse-active');
                } else {
                    isPinching = false;
                    document.getElementById('status').innerText = "GIMBAL READY";
                    document.getElementById('ui').classList.remove('pulse-active');
                }
                document.getElementById('hand-coord').innerText = `X:${targetPos.x.toFixed(1)} Y:${targetPos.y.toFixed(1)}`;
                document.getElementById('alt-val').innerText = Math.floor(targetPos.y * 100 + 1200);
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraFeed.start();

        // --- 5. Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const isBoosting = targetPos.y > 6;
            const flightSpeed = isBoosting ? 5.5 : 2.2;
            
            // Dynamic Camera Field of View
            camera.fov = THREE.MathUtils.lerp(camera.fov, isBoosting ? 100 : 75, 0.05);
            camera.updateProjectionMatrix();

            // Navigation Smoothing
            jetGroup.position.lerp(targetPos, 0.08);
            jetGroup.rotation.z = (jetGroup.position.x - targetPos.x) * 0.35;
            jetGroup.rotation.x = (targetPos.y - jetGroup.position.y) * 0.15;

            // Thruster Particles
            createParticle(new THREE.Vector3(jetGroup.position.x, jetGroup.position.y, jetGroup.position.z + 1.5), isBoosting ? 0xffffff : 0xffaa00, 0.12, 0.05);

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.add(p.userData.vel);
                p.userData.life -= 0.04;
                p.material.opacity = p.userData.life;
                if (p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
            }

            // Red Space Warp
            const pos = stars.geometry.attributes.position.array;
            for (let i = 2; i < pos.length; i += 3) {
                pos[i] += flightSpeed;
                if (pos[i] > 10) pos[i] = -280;
            }
            stars.geometry.attributes.position.needsUpdate = true;

            // Firing Navigation & Collision
            for (let i = lasers.length - 1; i >= 0; i--) {
                const l = lasers[i];
                l.position.add(l.userData.velocity);
                l.position.x += l.userData.lateralInheritance; // Add lateral drift

                enemies.forEach((enemy) => {
                    if (l.position.distanceTo(enemy.mesh.position) < 2.5) {
                        for(let j=0; j<15; j++) createParticle(enemy.mesh.position, 0xff5500, 0.2, 0.5);
                        scene.remove(l);
                        lasers.splice(i, 1);
                        enemy.health--;
                    }
                });
                if (l && l.position.z < -280) { scene.remove(l); lasers.splice(i, 1); }
            }

            // Enemies Drift
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].mesh.position.z += flightSpeed * 0.75;
                if (enemies[i].health <= 0 || enemies[i].mesh.position.z > 20) {
                    scene.remove(enemies[i].mesh);
                    enemies.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
